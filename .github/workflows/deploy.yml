name: Build Docker Image (Manual Upload)

on:
  push:
    branches: [ main ]  # أو الفرع الذي تعمل عليه

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t whisperx-frontend:latest .

      - name: Save image as tar file
        run: |
          docker save whisperx-frontend:latest -o whisperx-frontend.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisperx-frontend-image
          path: whisperx-frontend.tar
